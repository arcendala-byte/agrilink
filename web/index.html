<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriLink</title>
  <link rel="manifest" href="manifest.json">
  
  <!-- Google Maps API -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAvDEaqNfdhHwWt6jgZK6XhH4JyFJsYFLo&libraries=places,geometry&callback=initMap" async defer></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      padding: 0;
      background: #F8FAF8;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
  </style>
</head>
<body>
  <script>
    function initMap() {
      console.log('Google Maps API loaded successfully');
    }
  </script>
  
  <!-- Firebase SDK for Web Push Notifications -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
  
  <script>
    const vapidKey = "BNEyGp0uY8-v8dm_ywSdf-uks4wZO2-41WuO92n26UDg_miWJDB9nBtIv0ouUtxpPxFGlnk0417M0q7IsHWjv3k";
    
    const firebaseConfig = {
      apiKey: "AIzaSyDTSQjJjyGRL_4QxtyPbrqmaC6CvdqGBeY",
      authDomain: "agrilinknew-4ba5f.firebaseapp.com",
      projectId: "agrilinknew-4ba5f",
      storageBucket: "agrilinknew-4ba5f.firebasestorage.app",
      messagingSenderId: "414602884782",
      appId: "1:414602884782:web:0b229b003c7a5296bdf3f",
      measurementId: "G-L7JDZZN88F"
    };
    
    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();
    
    async function initializePushNotifications() {
      try {
        const registration = await navigator.serviceWorker.ready;
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          console.log('Notification permission granted');
          const token = await messaging.getToken({ 
            vapidKey: vapidKey,
            serviceWorkerRegistration: registration
          });
          console.log('FCM Token:', token);
        }
      } catch (error) {
        console.error('Error initializing notifications:', error);
      }
    }
    
    messaging.onMessage((payload) => {
      console.log('Message received:', payload);
      if (payload.notification && Notification.permission === 'granted') {
        new Notification(payload.notification.title, {
          body: payload.notification.body,
          icon: '/icons/icon-192.png'
        });
      }
    });
    
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async function() {
        try {
          const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
          console.log('ServiceWorker registered:', registration);
          await initializePushNotifications();
        } catch (error) {
          console.log('ServiceWorker registration failed:', error);
        }
      });
    }
  </script>
  
  <!-- Flutter web app initialization - MODERN METHOD -->
  <script>
    {{flutter_js}}
    {{flutter_build_config}}
    
    _flutter.loader.load({
      onEntrypointLoaded: async function(engineInitializer) {
        const appRunner = await engineInitializer.initializeEngine();
        await appRunner.runApp();
      }
    });
  </script>
</body>
</html>
